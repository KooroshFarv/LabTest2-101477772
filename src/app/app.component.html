<div class="min-h-screen bg-gradient-to-br from-slate-100 via-purple-50 to-indigo-100">
  <header class="px-6 py-8 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-3">
      Harry Potter Explorer
    </h1>
    <p class="text-gray-600 text-lg">
      Explore characters and spells from the wizarding world
    </p>

    <div class="flex justify-center gap-4 mt-6">
      <button
        class="rounded-xl px-5 py-3 font-medium text-white transition"
        [class.bg-purple-700]="page() === 'characters'"
        [class.bg-indigo-600]="page() !== 'characters'"
        [class.hover:opacity-90]="true"
        (click)="page.set('characters')"
      >
        Characters
      </button>

      <button
        class="rounded-xl px-5 py-3 font-medium text-white transition"
        [class.bg-purple-700]="page() === 'spells'"
        [class.bg-indigo-600]="page() !== 'spells'"
        [class.hover:opacity-90]="true"
        (click)="page.set('spells')"
      >
        Spells
      </button>
    </div>
  </header>

  @if (page() === 'characters') {
    <app-characters></app-characters>
  }

  @if (page() === 'spells') {
    <app-spells></app-spells>
  }
</div>
