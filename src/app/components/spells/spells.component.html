<div class="max-w-5xl mx-auto p-6">
  <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6">
    Spells
  </h2>

  <input
    type="text"
    placeholder="Search spell..."
    class="w-full rounded-xl border border-gray-300 px-4 py-3 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-8"
    (input)="searchTerm.set($any($event.target).value)"
  />

  @if (loading()) {
    <p class="text-center text-gray-500 text-lg">Loading spells</p>
  }

  @if (!loading() && filteredSpells().length === 0) {
    <p class="text-center text-red-500 text-lg">No spells found</p>
  }

  <div class="grid md:grid-cols-2 gap-5">
    @for (spell of filteredSpells(); track spell.id) {
      <div class="bg-white rounded-2xl shadow-md p-5 hover:shadow-xl transition">
        <h3 class="text-xl font-semibold text-purple-700 mb-2">
          {{ spell.name }}
        </h3>
        <p class="text-gray-600">
          {{ spell.description || 'No description available.' }}
        </p>
      </div>
    }
  </div>
</div>
